name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --no-audit --no-fund

      - run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SITE_URL: https://free-market.pages.dev

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 024a2968eda48c6eaea6d761c59eaa72
          command: pages deploy dist --project-name=free-market

      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://www.felikko.com/sitemap.xml" || true

      - name: Ping Bing via IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "www.felikko.com",
              "key": "e0ddcb9227cd44f1a877926bb1db4a06",
              "keyLocation": "https://www.felikko.com/e0ddcb9227cd44f1a877926bb1db4a06.txt",
              "urlList": [
                "https://www.felikko.com/",
                "https://www.felikko.com/products"
              ]
            }' || true
